<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Faculty - College Virtual Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            margin: 50px auto;
            max-width: 600px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h2 {
            color: #28a745;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h2><i class="bi bi-pencil-square"></i> Edit Faculty</h2>
                <p class="text-muted">Update faculty information</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <input type="hidden" name="faculty_id" value="{{ faculty.id }}">
                
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name *</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ faculty.name }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ faculty.email }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number *</label>
                    <input type="tel" class="form-control" id="phone" name="phone" value="{{ faculty.phone }}" required 
                           pattern="[0-9]{10}" title="Enter 10-digit phone number">
                </div>
                
                <div class="mb-3">
                    <label for="department" class="form-label">Department *</label>
                    <select class="form-select" id="department" name="department" required>
                        <option value="Computer Science" {{ 'selected' if faculty.department == 'Computer Science' else '' }}>Computer Science</option>
                        <option value="Electronics" {{ 'selected' if faculty.department == 'Electronics' else '' }}>Electronics</option>
                        <option value="Mechanical" {{ 'selected' if faculty.department == 'Mechanical' else '' }}>Mechanical</option>
                        <option value="Civil" {{ 'selected' if faculty.department == 'Civil' else '' }}>Civil</option>
                        <option value="Electrical" {{ 'selected' if faculty.department == 'Electrical' else '' }}>Electrical</option>
                        <option value="Physics" {{ 'selected' if faculty.department == 'Physics' else '' }}>Physics</option>
                        <option value="Chemistry" {{ 'selected' if faculty.department == 'Chemistry' else '' }}>Chemistry</option>
                        <option value="Mathematics" {{ 'selected' if faculty.department == 'Mathematics' else '' }}>Mathematics</option>
                        <option value="Treasurer" {{ 'selected' if faculty.department == 'Treasurer' else '' }}>Treasurer (Accounts)</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="consultation_time" class="form-label">Consultation Time</label>
                    <input type="text" class="form-control" id="consultation_time" name="consultation_time" 
                           value="{{ faculty.consultation_time or '' }}" 
                           placeholder="e.g., Mon-Wed 2-4 PM">
                    <div class="form-text">Example: Mon-Wed 2-4 PM</div>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{{ url_for('manage_faculty') }}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Faculty
                    </a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-circle"></i> Update Faculty
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
