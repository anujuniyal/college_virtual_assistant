<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - College Virtual Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f5f7fa;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            padding: 40px;
            margin: 50px auto;
            max-width: 600px;
        }
        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .form-header h2 {
            color: #667eea;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-container">
            <div class="form-header">
                <h2><i class="bi bi-pencil-square"></i> Edit Student</h2>
                <p class="text-muted">Update student information</p>
            </div>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            
            <form method="POST">
                <input type="hidden" name="student_id" value="{{ student.id }}">
                
                <div class="mb-3">
                    <label for="roll_number" class="form-label">Roll Number *</label>
                    <input type="text" class="form-control" id="roll_number" name="roll_number" 
                           value="{{ student.roll_number }}" required 
                           pattern="[A-Z0-9]{6,10}" title="Roll number should be 6-10 alphanumeric characters">
                </div>
                
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name *</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ student.name }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number *</label>
                    <input type="tel" class="form-control" id="phone" name="phone" value="{{ student.phone }}" required 
                           pattern="[0-9]{10}" title="Enter 10-digit phone number">
                </div>
                
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address *</label>
                    <input type="email" class="form-control" id="email" name="email" value="{{ student.email }}" required>
                </div>
                
                <div class="mb-3">
                    <label for="department" class="form-label">Department *</label>
                    <select class="form-select" id="department" name="department" required>
                        <option value="Computer Science" {{ 'selected' if student.department == 'Computer Science' else '' }}>Computer Science</option>
                        <option value="Electronics" {{ 'selected' if student.department == 'Electronics' else '' }}>Electronics</option>
                        <option value="Mechanical" {{ 'selected' if student.department == 'Mechanical' else '' }}>Mechanical</option>
                        <option value="Civil" {{ 'selected' if student.department == 'Civil' else '' }}>Civil</option>
                        <option value="Electrical" {{ 'selected' if student.department == 'Electrical' else '' }}>Electrical</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="semester" class="form-label">Semester *</label>
                    <select class="form-select" id="semester" name="semester" required>
                        <option value="1" {{ 'selected' if student.semester == 1 else '' }}>Semester 1</option>
                        <option value="2" {{ 'selected' if student.semester == 2 else '' }}>Semester 2</option>
                        <option value="3" {{ 'selected' if student.semester == 3 else '' }}>Semester 3</option>
                        <option value="4" {{ 'selected' if student.semester == 4 else '' }}>Semester 4</option>
                        <option value="5" {{ 'selected' if student.semester == 5 else '' }}>Semester 5</option>
                        <option value="6" {{ 'selected' if student.semester == 6 else '' }}>Semester 6</option>
                        <option value="7" {{ 'selected' if student.semester == 7 else '' }}>Semester 7</option>
                        <option value="8" {{ 'selected' if student.semester == 8 else '' }}>Semester 8</option>
                    </select>
                </div>
                
                <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                    <a href="{{ url_for('manage_students') }}" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Back to Students
                    </a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Update Student
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
