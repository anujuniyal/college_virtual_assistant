version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: edubot_postgres_dev
    environment:
      POSTGRES_DB: edubot_dev
      POSTGRES_USER: edubot_user
      POSTGRES_PASSWORD: edubot_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edubot_user -d edubot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
