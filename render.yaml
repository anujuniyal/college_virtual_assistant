services:
  # Web Service with Neon Database - Manual Environment Setup
  - type: web
    name: college-virtual-assistant
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 1 --timeout 30 --max-requests 500 --max-requests-jitter 50 --limit-request-line 4094 --limit-request-field-size 8190 --worker-class sync wsgi:app"
    # Health check configuration
    healthCheckPath: /health
    autoDeploy: true
    # Environment Variables
    envVars:
      # Email Configuration
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: true
      - key: MAIL_USERNAME
        value: anujjaj007@gmail.com
      - key: MAIL_PASSWORD
        value: rcazqavcugddlwzt
      - key: MAIL_DEFAULT_SENDER
        value: anujjaj007@gmail.com
      - key: ADMIN_EMAIL
        value: uniyalanuj1@gmail.com
