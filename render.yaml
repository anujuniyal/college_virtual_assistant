services:
  # Web Service
  - type: web
    name: edubot-college-assistant
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 4 --timeout 120 wsgi:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edubot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.0
      # Add database initialization command
      - key: INIT_DB_ON_START
        value: "true"
    healthCheckPath: /health
    # Add pre-deploy hook to initialize database
    preDeployCommand: "python database_manager.py init"
    
databases:
  # PostgreSQL Database (Render provides free PostgreSQL)
  - name: edubot-db
    databaseName: edubot
    user: edubot_user
