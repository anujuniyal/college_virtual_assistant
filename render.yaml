services:
  # Web Service with Neon Database - Manual Environment Setup
  - type: web
    name: college-virtual-assistant
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 60 wsgi:app"
    # Health check configuration
    healthCheckPath: /health
    autoDeploy: true
    # Environment Variables
    envVars:
      # Session Security for Remember Me
      - key: SECRET_KEY
        value: "edubot-render-secret-key-2024-secure-production"
      - key: FLASK_ENV
        value: production
      # Email Configuration - Resend API for Render compatibility
      - key: MAIL_SERVER
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USE_TLS
        value: true
      - key: MAIL_USERNAME
        value: anujjaj007@gmail.com
      - key: MAIL_PASSWORD
        value: rcazqavcugddlwzt
      - key: MAIL_DEFAULT_SENDER
        value: anujjaj007@gmail.com
      - key: ADMIN_EMAIL
        value: uniyalanuj1@gmail.com
      # Brevo API Configuration (Primary - 300/day free)
      - key: BREVO_API_KEY
        value: ${BREVO_API_KEY}
      - key: BREVO_SENDER_NAME
        value: College Virtual Assistant
      - key: PUBLIC_BASE_URL
        value: https://college-virtual-assistant.onrender.com
      # Resend API Configuration (for Render - Backup)
      - key: RESEND_API_KEY
        value: re_GpW6xn9B_64LCSMbR9HZ7wMRmqVKQLHuj
